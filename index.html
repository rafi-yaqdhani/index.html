<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Ugiary ❤️</title>
<style>
body {
    background: linear-gradient(to right, #ff9a9e, #fad0c4);
    font-family: 'Comic Sans MS', cursive;
    text-align: center;
    padding: 50px;
    color: #fff;
}
.card {
    background: rgba(255,255,255,0.2);
    border-radius: 20px;
    padding: 30px;
}
.btn {
    margin-top: 20px;
    padding: 10px 20px;
    background: #ff4d6d;
    border: none;
    border-radius: 10px;
    color: white;
    font-size: 18px;
    cursor: pointer;
}
img {
    margin-top: 20px;
    width: 260px;
    border-radius: 15px;
    display: none;
    animation: fadeIn 1s ease;
}
@keyframes fadeIn {
    from {opacity:0; transform:scale(0.8);}
    to {opacity:1; transform:scale(1);}
}
</style>
</head>

<body>

<audio autoplay loop>
<source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<div class="card">
<h1>🎉 Happy Birthday Ugiary ❤️</h1>

<p>
Selamat ulang tahun yaa sayangku 😚💕<br><br>
Semoga panjang umur & selalu sama aku ya 😝❤️
</p>

<button class="btn" onclick="showLove()">Klik Aku 😳</button>

<p id="msg"></p>

<img id="photo" src="data:image/jpeg;base64,REPLACE_BASE64_HERE">
</div>

<script>
function showLove(){
    document.getElementById("msg").innerHTML =
    "Ini kitaa 😭❤️ pasangan paling gemes sedunia 🥺💖";
    document.getElementById("photo").style.display = "block";
}
</script>

</body>
</html>
